name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 06:00 UTC

permissions:
  security-events: write
  contents: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: java-kotlin
          build-mode: manual

      # CodeQL's manual build mode traces real javac invocations. The Gradle build cache (restored by
      # setup-gradle) otherwise serves compiled classes FROM-CACHE/UP-TO-DATE, so no javac runs and CodeQL
      # reports "no source code seen". `clean` + `--no-build-cache` + `--rerun-tasks` forces a real compile.
      - name: Build (compile main + test sources)
        run: ./gradlew clean compileJava compileTestJava --no-daemon --no-build-cache --rerun-tasks

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
